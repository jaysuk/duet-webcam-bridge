name: Release

# Cross-compiles the bridge for every supported platform, bundles a matching
# static ffmpeg + the launcher scripts into a ready-to-run archive, and publishes
# a GitHub Release with all of them attached. Just push a version tag:
#
#   git tag v1.0.0 && git push origin v1.0.0
#
# You can also run it manually (Actions -> Release -> Run workflow) to build the
# archives as artifacts without publishing a Release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # create the Release and upload assets

env:
  # The Conventional-Commit changelog generator is shared across the Duet plugin family and lives in
  # the runtime repo (single source of truth). Pinned to a ref; bump this one line to adopt changelog
  # format changes. Source: jaysuk/dwc-plugin-runtime → scripts/changelog.mjs.
  RUNTIME_REF: d077f81a11bb5af9a35fe39f7b82d789eab19896

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - windows-amd64
          - linux-amd64
          - linux-arm64
          - macos-amd64
          # linux-armhf (32-bit Pi) is supported by the scripts but not
          # pre-built: johnvansickle's armhf static build returns HTTP 415 to
          # GitHub's runners. 64-bit Pi OS users use linux-arm64.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Resolve version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev+${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package ${{ matrix.target }}
        run: bash scripts/package.sh "${{ matrix.target }}" "${{ steps.ver.outputs.version }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            dist/*.zip
            dist/*.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      # Check out (with full history + tags) so the shared changelog generator can diff against the
      # previous tag. The build job builds the binaries; this job only needs the git history + Node.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v4
        with: { node-version: 24 }

      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # Fetch the shared changelog generator from the runtime repo (single source of truth, pinned ref).
      - name: Fetch shared release-notes generator
        run: curl -fsSL "https://raw.githubusercontent.com/jaysuk/dwc-plugin-runtime/${RUNTIME_REF}/scripts/changelog.mjs" -o "$RUNNER_TEMP/changelog.mjs"

      # Body = shared Conventional-Commit changelog (Features / Bug Fixes / …) followed by this
      # project's static "which file do I download" footer.
      - name: Generate release notes
        id: changelog
        run: |
          {
            echo 'body<<__CHANGELOG_EOF__'
            node "$RUNNER_TEMP/changelog.mjs"
            cat <<'__FOOTER__'

          ---

          Cross-platform USB-camera-to-DWC bridge. **ffmpeg is bundled** - nothing to install.

          ### Which file do I download?
          | Your computer | File |
          | --- | --- |
          | Windows PC | `*-windows-amd64.zip` |
          | Mac (Intel or Apple Silicon) | `*-macos-amd64.tar.gz` |
          | Linux PC | `*-linux-amd64.tar.gz` |
          | Raspberry Pi (64-bit OS) | `*-linux-arm64.tar.gz` |

          Unzip, run the launcher inside, then paste the printed `/stream` URL into
          **DWC -> Settings -> Webcam** (set the update interval to 0 for live video).
          See the bundled `QUICKSTART.txt` or the [README](https://github.com/jaysuk/duet-webcam-bridge#readme).
          __FOOTER__
            echo '__CHANGELOG_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          body: ${{ steps.changelog.outputs.body }}
          files: |
            artifacts/*.zip
            artifacts/*.tar.gz
          fail_on_unmatched_files: true
